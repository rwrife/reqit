name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint / Typecheck / Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Unit tests (vitest)
        run: npm run test:unit --if-present

      - name: VS Code integration tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test --if-present

      - name: VS Code integration tests (non-Linux)
        if: runner.os != 'Linux'
        run: npm test --if-present

  no-telemetry-check:
    name: No-telemetry import scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build bundle
        run: npm run build --if-present
      - name: Scan bundle for telemetry SDKs
        shell: bash
        run: |
          set -euo pipefail
          patterns='applicationinsights|@sentry/|mixpanel|amplitude|posthog|segment-analytics|vscode-extension-telemetry'
          if [ -d dist ]; then
            if grep -REn "$patterns" dist/ ; then
              echo "::error::Telemetry SDK detected in build output"
              exit 1
            fi
          fi
          echo "OK: no telemetry SDKs found in dist/"
