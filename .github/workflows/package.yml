name: Package VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  vsix:
    name: Build .vsix artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manifest
        id: pkg
        shell: bash
        run: |
          if [ -f package.json ]; then echo "has_pkg=true" >> "$GITHUB_OUTPUT"; else echo "has_pkg=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then echo "has_lock=true" >> "$GITHUB_OUTPUT"; else echo "has_lock=false" >> "$GITHUB_OUTPUT"; fi

      - name: Setup Node.js (with cache)
        if: steps.pkg.outputs.has_lock == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Node.js (no cache)
        if: steps.pkg.outputs.has_lock != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.pkg.outputs.has_pkg == 'true'
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build
        if: steps.pkg.outputs.has_pkg == 'true'
        run: npm run build --if-present

      - name: Install vsce
        if: steps.pkg.outputs.has_pkg == 'true'
        run: npm i -g @vscode/vsce

      - name: Package
        if: steps.pkg.outputs.has_pkg == 'true'
        run: vsce package --no-dependencies --out reqit.vsix

      - name: Upload artifact
        if: steps.pkg.outputs.has_pkg == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reqit-vsix
          path: reqit.vsix
          if-no-files-found: error

      - name: No package.json yet — skipping
        if: steps.pkg.outputs.has_pkg != 'true'
        run: echo "No package.json in repo yet; .vsix packaging is a no-op until M1 scaffolds it."
